name: Bootstrap Barrio Custom Subtheme
type: theme
description: 'The subtheme of basic structure for a Bootstrap Barrio.'
core_version_requirement: ^9 || ^10 || ^11 || ^12
base theme: bootstrap_barrio

libraries:
  - bootstrap_barrio_subtheme_custom/bootstrap_cdn
  - bootstrap_barrio_subtheme_custom/global-styling
  - bootstrap_barrio_subtheme_custom/js-header
  - bootstrap_barrio_subtheme_custom/js-footer

libraries-override:
  core/jquery:
    js:
      # Drupal 同梱の jQuery を無効化して 置き換える
      # assets/vendor/jquery/jquery.min.js: js/lib/jquery-4.0.0-rc.1.min.js
      assets/vendor/jquery/jquery.min.js: js/lib/jquery-3.7.1.min.js

regions:
  top_header: 'Top header'
  top_header_form: 'Top header form'
  header: Header
  header_form: 'Header form'
  primary_menu: 'Primary menu'
  secondary_menu: 'Secondary menu'
  page_top: 'Page top'
  page_bottom: 'Page bottom'
  highlighted: Highlighted
  featured_top: 'Featured top'
  breadcrumb: Breadcrumb
  content: Content
  sidebar_first: 'Sidebar first'
  sidebar_second: 'Sidebar second'
  featured_bottom_first: 'Featured bottom first'
  featured_bottom_second: 'Featured bottom second'
  featured_bottom_third: 'Featured bottom third'
  footer_first: 'Footer first'
  footer_second: 'Footer second'
  footer_third: 'Footer third'
  footer_fourth: 'Footer fourth'
  footer_fifth: 'Footer fifth'

# Information added by Drupal.org packaging script on 2023-03-25
version: '5.5.20'
project: 'bootstrap_barrio_subtheme_custom'
datestamp: 1679769015
